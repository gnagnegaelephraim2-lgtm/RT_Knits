<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <style>
      .rt-red { fill: #e30613; }
      .rt-blue { fill: #004b97; }
      .rt-letter-r {
        font-family: 'Arial Black', Arial, Helvetica, sans-serif;
        font-weight: 900;
        font-style: italic;
        font-size: 50px;
        fill: #e30613;
      }
      .rt-letter-t {
        font-family: 'Arial Black', Arial, Helvetica, sans-serif;
        font-weight: 900;
        font-style: italic;
        font-size: 50px;
        fill: #004b97;
      }
    </style>
  </defs>

  <!-- White Base Circle -->
  <circle cx="50" cy="50" r="48" fill="#ffffff" stroke="#f0f0f0" stroke-width="2"/>

  <!-- Red Top-Left Swoosh Arc -->
  <path class="rt-red" d="M 50 4 A 46 46 0 0 0 4 50 C 4 24 24 6 50 4 Z" />
  <path class="rt-red" d="M 50 4 C 73 4 87 18 92 28 C 81 14 66 6 50 4 Z" />

  <!-- Blue Bottom-Right Swoosh Arc -->
  <path class="rt-blue" d="M 50 96 A 46 46 0 0 0 96 50 C 96 76 76 94 50 96 Z" />
  <path class="rt-blue" d="M 50 96 C 27 96 13 82 8 72 C 19 86 34 94 50 96 Z" />

  <!-- Stylized Red 'R' -->
  <text x="32" y="67" class="rt-letter-r" text-anchor="middle">R</text>

  <!-- Stylized Blue 'T' -->
  <text x="65" y="67" class="rt-letter-t" text-anchor="middle">T</text>
</svg>
