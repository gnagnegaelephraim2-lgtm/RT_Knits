<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
  </defs>
  
  <!-- Outer circle with red border -->
  <circle cx="60" cy="60" r="56" fill="#dc2626" stroke="#991b1b" stroke-width="2"/>
  
  <!-- Inner blue gradient circle -->
  <circle cx="60" cy="60" r="48" fill="url(#logoGrad)"/>
  
  <!-- Inner highlight -->
  <circle cx="60" cy="60" r="40" fill="url(#innerGrad)" opacity="0.3"/>
  
  <!-- RT Text -->
  <text x="60" y="72" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="-1">RT</text>
  
  <!-- Knits text below -->
  <text x="60" y="95" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="600" fill="#93c5fd" text-anchor="middle" letter-spacing="2">KNITS</text>
</svg>